<div class="device" role="img" aria-label="Preview ng MasidBaha map screen">
  <div class="device__frame">
    <div class="device__notch"></div>

    <div class="device__screen">
      <div class="screen__statusbar">
        <span class="screen__brand">MasidBaha</span>
        <span class="screen__badge">Live</span>
      </div>

      <div class="screen__map">
        <div class="map__pin map__pin--1">
          <app-pulse-pin tone="water" size="sm"></app-pulse-pin>
        </div>
        <div class="map__pin map__pin--2">
          <app-pulse-pin tone="alert" size="sm"></app-pulse-pin>
        </div>
        <div class="map__pin map__pin--3">
          <app-pulse-pin tone="water" size="sm"></app-pulse-pin>
        </div>

        <svg class="map__roads" viewBox="0 0 300 220" preserveAspectRatio="none" aria-hidden="true">
          <path d="M0 60 L300 40" stroke="rgba(238,243,251,0.08)" stroke-width="3" fill="none" />
          <path d="M20 0 L60 220" stroke="rgba(238,243,251,0.08)" stroke-width="3" fill="none" />
          <path d="M0 160 L300 190" stroke="rgba(238,243,251,0.06)" stroke-width="2" fill="none" />
        </svg>
      </div>

      <div class="screen__card">
        <div class="card__row">
          <span class="card__dot"></span>
          <div class="card__lines">
            <span class="card__line card__line--title"></span>
            <span class="card__line card__line--sub"></span>
          </div>
        </div>
        <div class="card__actions">
          <span class="card__btn card__btn--primary">Kumpirmahin</span>
          <span class="card__btn">Wala na</span>
        </div>
      </div>
    </div>
  </div>

  <div class="device__glow" aria-hidden="true"></div>
</div>
